<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Scorecard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-cell { outline: 3px solid #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-20">

    <div id="app" class="max-w-md mx-auto p-4">
        <div id="setup-screen" class="space-y-6">
            <header class="text-center py-6">
                <h1 class="text-3xl font-black text-slate-800">GOLF <span class="text-green-600">SCORE</span></h1>
                <p class="text-slate-500">Low score wins. Good luck!</p>
            </header>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <label class="block text-sm font-bold text-slate-700 mb-2">Game Length</label>
                <div class="flex gap-4 mb-6">
                    <button onclick="setRounds(9)" id="btn-9" class="flex-1 py-3 rounded-xl border-2 border-green-600 bg-green-50 text-green-700 font-bold">9 Rounds</button>
                    <button onclick="setRounds(18)" id="btn-18" class="flex-1 py-3 rounded-xl border-2 border-slate-200 text-slate-500 font-bold">18 Rounds</button>
                </div>

                <label class="block text-sm font-bold text-slate-700 mb-2">Players</label>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="player-input" placeholder="Enter name..." class="flex-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-green-500 outline-none">
                    <button onclick="addPlayer()" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-700 transition">+</button>
                </div>
                <ul id="player-list" class="space-y-2 mb-6"></ul>

                <button onclick="startGame()" id="start-btn" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-green-200 hidden">START GAME</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <button onclick="location.reload()" class="text-slate-400 text-sm font-bold">← RESET</button>
                <div id="round-indicator" class="bg-slate-800 text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">9 Rounds</div>
            </div>

            <div class="overflow-x-auto no-scrollbar bg-white rounded-2xl shadow-sm border border-slate-200">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr id="table-header" class="bg-slate-50 border-b border-slate-200">
                            <th class="p-3 text-xs font-black text-slate-400 uppercase">Rd</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                    <tfoot>
                        <tr id="table-footer" class="bg-slate-800 text-white font-bold">
                            <td class="p-3">TOTAL</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <div id="numpad-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex-end items-end">
        <div class="w-full bg-white rounded-t-3xl p-6 shadow-2xl animate-slide-up">
            <div class="flex justify-between items-center mb-4">
                <h3 id="numpad-target" class="text-lg font-bold text-slate-800 underline decoration-green-500">Player Name</h3>
                <button onclick="closeNumpad()" class="text-slate-400 font-bold p-2">DONE</button>
            </div>
            
            <div class="grid grid-cols-3 gap-3">
                <button onclick="pressKey(1)" class="py-4 bg-slate-100 rounded-xl text-xl font-bold active:bg-slate-200">1</button>
                <button onclick="pressKey(2)" class="py-4 bg-slate-100 rounded-xl text-xl font-bold active:bg-slate-200">2</button>
                <button onclick="pressKey(3)" class="py-4 bg-slate-100 rounded-xl text-xl font-bold active:bg-slate-200">3</button>
                <button onclick="pressKey(4)" class="py-4 bg-slate-100 rounded-xl text-xl font-bold active:bg-slate-200">4</button>
                <button onclick="pressKey(5)" class="py-4 bg-slate-100 rounded-xl text-xl font-bold active:bg-slate-200">5</button>
                <button onclick="pressKey(6)" class="py-4 bg-slate-100 rounded-xl text-xl font-bold active:bg-slate-200">6</button>
                <button onclick="pressKey(7)" class="py-4 bg-slate-100 rounded-xl text-xl font-bold active:bg-slate-200">7</button>
                <button onclick="pressKey(8)" class="py-4 bg-slate-100 rounded-xl text-xl font-bold active:bg-slate-200">8</button>
                <button onclick="pressKey(9)" class="py-4 bg-slate-100 rounded-xl text-xl font-bold active:bg-slate-200">9</button>
                
                <button onclick="toggleMinus()" class="py-4 bg-blue-100 text-blue-600 rounded-xl text-xl font-bold">+/-</button>
                <button onclick="pressKey(0)" class="py-4 bg-slate-100 rounded-xl text-xl font-bold active:bg-slate-200">0</button>
                <button onclick="pressKey('CLR')" class="py-4 bg-red-50 text-red-500 rounded-xl text-sm font-bold">CLR</button>
                
                <button onclick="directSet(-2)" class="col-span-1 py-4 bg-green-600 text-white rounded-xl font-bold">-2 (K)</button>
                <button onclick="directSet(10)" class="col-span-2 py-4 bg-slate-800 text-white rounded-xl font-bold">10 (Face)</button>
            </div>
        </div>
    </div>

    <script>
        let players = [];
        let totalRounds = 9;
        let scores = {}; // Format: { playerName: [round1, round2...] }
        let activeCell = { player: null, round: null };

        // --- Setup Logic ---
        function setRounds(r) {
            totalRounds = r;
            document.getElementById('btn-9').className = r === 9 ? 'flex-1 py-3 rounded-xl border-2 border-green-600 bg-green-50 text-green-700 font-bold' : 'flex-1 py-3 rounded-xl border-2 border-slate-200 text-slate-500 font-bold';
            document.getElementById('btn-18').className = r === 18 ? 'flex-1 py-3 rounded-xl border-2 border-green-600 bg-green-50 text-green-700 font-bold' : 'flex-1 py-3 rounded-xl border-2 border-slate-200 text-slate-500 font-bold';
        }

        function addPlayer() {
            const input = document.getElementById('player-input');
            const name = input.value.trim();
            if (name && !players.includes(name)) {
                players.push(name);
                scores[name] = Array(totalRounds).fill(null);
                renderPlayerList();
                input.value = '';
            }
            document.getElementById('start-btn').classList.toggle('hidden', players.length === 0);
        }

        function renderPlayerList() {
            const list = document.getElementById('player-list');
            list.innerHTML = players.map(p => `
                <li class="flex justify-between items-center bg-slate-50 p-3 rounded-lg font-medium">
                    ${p}
                    <button onclick="removePlayer('${p}')" class="text-red-400 text-sm">Remove</button>
                </li>
            `).join('');
        }

        function removePlayer(name) {
            players = players.filter(p => p !== name);
            delete scores[name];
            renderPlayerList();
            document.getElementById('start-btn').classList.toggle('hidden', players.length === 0);
        }

        // --- Game Logic ---
        function startGame() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('round-indicator').innerText = `${totalRounds} Rounds`;
            
            const header = document.getElementById('table-header');
            players.forEach(p => {
                header.innerHTML += `<th class="p-3 text-sm font-bold text-slate-700">${p}</th>`;
            });

            const body = document.getElementById('table-body');
            for (let r = 0; r < totalRounds; r++) {
                let row = `<tr class="border-b border-slate-100">
                    <td class="p-3 text-xs font-bold text-slate-400">${r + 1}</td>`;
                players.forEach(p => {
                    row += `<td onclick="openNumpad('${p}', ${r})" id="cell-${p}-${r}" class="p-3 text-lg font-medium text-slate-300 border-l border-slate-50 cursor-pointer text-center">-</td>`;
                });
                row += `</tr>`;
                body.innerHTML += row;
            }

            const footer = document.getElementById('table-footer');
            players.forEach(p => {
                footer.innerHTML += `<td id="total-${p}" class="p-3 text-center">0</td>`;
            });
        }

        // --- Numpad Logic ---
        function openNumpad(player, round) {
            activeCell = { player, round };
            document.getElementById('numpad-target').innerText = `${player} - Rd ${round + 1}`;
            document.getElementById('numpad-modal').classList.remove('hidden');
            document.getElementById('numpad-modal').classList.add('flex');
            
            // Highlight current cell
            document.querySelectorAll('td').forEach(td => td.classList.remove('active-cell'));
            document.getElementById(`cell-${player}-${round}`).classList.add('active-cell');
        }

        function closeNumpad() {
            document.getElementById('numpad-modal').classList.add('hidden');
            document.querySelectorAll('td').forEach(td => td.classList.remove('active-cell'));
        }

        function pressKey(val) {
            let current = scores[activeCell.player][activeCell.round];
            if (val === 'CLR') {
                scores[activeCell.player][activeCell.round] = null;
            } else {
                let str = current === null ? "" : current.toString();
                scores[activeCell.player][activeCell.round] = parseInt(str + val);
            }
            updateUI();
        }

        function toggleMinus() {
            let current = scores[activeCell.player][activeCell.round];
            if (current !== null) {
                scores[activeCell.player][activeCell.round] = current * -1;
                updateUI();
            }
        }

        function directSet(val) {
            scores[activeCell.player][activeCell.round] = val;
            updateUI();
            closeNumpad();
        }

        function updateUI() {
            const cell = document.getElementById(`cell-${activeCell.player}-${activeCell.round}`);
            const val = scores[activeCell.player][activeCell.round];
            cell.innerText = val === null ? '-' : val;
            cell.classList.toggle('text-slate-800', val !== null);
            cell.classList.toggle('text-slate-300', val === null);
            
            // Update Totals
            players.forEach(p => {
                const total = scores[p].reduce((a, b) => a + (b || 0), 0);
                document.getElementById(`total-${p}`).innerText = total;
            });
        }
    </script>
</body>
</html>
